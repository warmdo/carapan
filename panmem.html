<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panduan Member Final</title>
<style>
body { font-family:'Poppins',sans-serif; background:#f5f6fa; margin:0; padding:0; }
header { position:sticky; top:0; background:#34495e; color:white; padding:20px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.1);}
header h1 { margin-bottom:10px; }
.controls { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:10px;}
.controls select, .controls input, .controls button { padding:10px; border-radius:8px; border:none; }
.controls select, .controls input { width:200px; }
.controls button { background:#2ecc71; color:white; cursor:pointer; transition:0.2s; }
.controls button:hover { background:#27ae60; }

.grid-container { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:20px; padding:20px; }

.guide-card { border-radius:12px; background:white; box-shadow:0 6px 12px rgba(0,0,0,0.1); display:flex; flex-direction:column; transition:transform 0.2s; }
.guide-card:hover { transform:translateY(-5px); }
.guide-header { background:#3498db; color:white; padding:15px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:space-between; }
.guide-header h3 { margin:0; display:flex; align-items:center; gap:8px; flex:1; }

.guide-content { padding:15px; font-size:0.95rem; line-height:1.5; display:none; background:#ecf0f1; }
.guide-flex { display:flex; gap:15px; align-items:flex-start; }
.guide-flex ol { flex:1; margin:0; padding-left:20px; }
.guide-flex img { max-width:150px; border-radius:8px; cursor:pointer; }

.guide-actions { margin-top:10px; text-align:right; }
.guide-actions button { margin-left:5px; padding:5px 10px; border:none; border-radius:5px; font-size:0.85rem; cursor:pointer; }
button.edit { background:#f39c12; color:white; }
button.delete { background:#e74c3c; color:white; }
button.save { background:#2ecc71; color:white; }
button.cancel { background:#95a5a6; color:white; }
button.copy { background:#3498db; color:white; }

#addGuideSection { display:none; max-width:800px; margin:20px auto; background:#fff; padding:25px; border-radius:15px; box-shadow:0 6px 18px rgba(0,0,0,0.15);}
#addGuideSection h2 { margin-bottom:20px; text-align:center; color:#34495e; }
.form-group { margin-bottom:15px; display:flex; flex-direction:column; }
.form-group label { font-weight:600; margin-bottom:5px; }
.form-group input, .form-group textarea { padding:12px; border-radius:8px; border:1px solid #ccc; font-size:0.95rem; width:100%; }
#addGuideBtn { padding:12px 25px; background:#2ecc71; color:white; border:none; border-radius:10px; font-size:1rem; cursor:pointer; display:block; margin:0 auto; transition:0.2s; }
#addGuideBtn:hover { background:#27ae60; }

#imgModal { display:none; position:fixed; z-index:50; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; }
#imgModal img { max-width:90%; max-height:90%; border-radius:10px; }
#imgModal span { position:absolute; top:20px; right:30px; font-size:2rem; color:white; cursor:pointer; }

@media (max-width:600px){
  .guide-flex { flex-direction:column; }
  .guide-flex img { max-width:100%; }
}
</style>
</head>
<body>

<header>
<h1>Panduan Member Profesional</h1>
<div class="controls">
<select id="siteSelector">
<option value="edan777">Edan777</option>
<option value="republik62">Republik62</option>
<option value="warga62">Warga62</option>
<option value="istana62">Istana62</option>
</select>
<input type="text" id="searchInput" placeholder="Cari panduan...">
<button id="showAddBtn">Tambah Panduan</button>
</div>
</header>

<main>
<section id="guidesContainer" class="grid-container"></section>

<section id="addGuideSection">
<h2>Tambah Panduan Baru</h2>
<div class="form-group">
<label>Judul Panduan</label>
<input type="text" id="newTitle" placeholder="Masukkan judul panduan">
</div>
<div class="form-group">
<label>Isi Panduan (pisahkan step dengan enter)</label>
<textarea id="newContent" placeholder="Step 1&#10;Step 2&#10;Step 3"></textarea>
</div>
<div class="form-group">
<label>Link Gambar (opsional)</label>
<input type="text" id="newImage" placeholder="Masukkan link gambar">
<div id="imagePreview"></div>
</div>
<button id="addGuideBtn">Tambah Panduan</button>
</section>
</main>

<div id="imgModal"><span onclick="document.getElementById('imgModal').style.display='none'">&times;</span><img id="modalImg"></div>

<script>
let guidesData={
edan777:[{title:"Cara Deposit", content:["Login akun","Klik menu DEPOSIT","Pilih metode pembayaran"], image:"https://via.placeholder.com/150"}],
republik62:[],
warga62:[],
istana62:[]
};

const siteSelector=document.getElementById('siteSelector');
const searchInput=document.getElementById('searchInput');
const guidesContainer=document.getElementById('guidesContainer');
const newImageInput=document.getElementById('newImage');
const imagePreview=document.getElementById('imagePreview');
const addSection=document.getElementById('addGuideSection');
const showAddBtn=document.getElementById('showAddBtn');

// Show/hide add form
showAddBtn.addEventListener('click', ()=>{
  addSection.style.display = addSection.style.display==='block'?'none':'block';
  if(addSection.style.display==='block') addSection.scrollIntoView({behavior:'smooth'});
});

// Render panduan
function renderGuides(site){
  const guides=guidesData[site]||[];
  guidesContainer.innerHTML=guides.map((g,idx)=>`
    <div class="guide-card" data-index="${idx}">
      <div class="guide-header" onclick="toggleContent(${idx})">
        <h3>📄 ${g.title}</h3>
      </div>
      <div class="guide-content">
        <div class="guide-flex">
          <ol>${g.content.map((step,i)=>`<li>${step}</li>`).join('')}</ol>
          ${g.image?`<img src="${g.image}" onclick="showModal(this.src)">`:''}
        </div>
        <div class="guide-actions">
          <button class="edit" onclick="startEdit(${idx})">Edit</button>
          <button class="delete" onclick="deleteGuide(${idx})">Hapus</button>
          <button class="copy" onclick="copyContent(${idx})">Copy</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleContent(idx){
  const contents=document.querySelectorAll('.guide-content');
  contents[idx].style.display=contents[idx].style.display==='block'?'none':'block';
}

// Edit inline
function startEdit(idx){
  const site=siteSelector.value;
  const g=guidesData[site][idx];
  const card=document.querySelector(`.guide-card[data-index="${idx}"]`);
  const contentDiv=card.querySelector('.guide-content');
  contentDiv.innerHTML=`
    <div>
      <input type="text" id="editTitle${idx}" value="${g.title}" style="width:100%;padding:8px;margin-bottom:8px;">
      <textarea id="editContent${idx}" style="width:100%;height:80px;padding:8px;margin-bottom:8px;">${g.content.join('\n')}</textarea>
      <input type="text" id="editImage${idx}" placeholder="Link gambar" style="width:100%;padding:8px;margin-bottom:8px;" value="${g.image||''}">
      <div style="margin-top:5px;text-align:right;">
        <button onclick="saveEdit(${idx})" class="save">Simpan</button>
        <button onclick="cancelEdit(${idx})" class="cancel">Batal</button>
      </div>
    </div>
  `;
  contentDiv.style.display='block';
}

function saveEdit(idx){
  const site=siteSelector.value;
  const g=guidesData[site][idx];
  g.title=document.getElementById(`editTitle${idx}`).value.trim();
  g.content=document.getElementById(`editContent${idx}`).value.trim().split('\n');
  g.image=document.getElementById(`editImage${idx}`).value.trim();
  renderGuides(site);
}

function cancelEdit(idx){ renderGuides(siteSelector.value); }
function deleteGuide(idx){ const site=siteSelector.value; if(confirm("Hapus panduan ini?")){ guidesData[site].splice(idx,1); renderGuides(site); } }

// Copy step lengkap dengan nomor
function copyContent(idx){
  const site=siteSelector.value;
  const g=guidesData[site][idx];
  const text = g.content.map((step,i)=>`${i+1}. ${step}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>{ alert("Isi panduan berhasil dicopy!"); });
}

// Add panduan baru
document.getElementById('addGuideBtn').addEventListener('click',()=>{
  const site = siteSelector.value;
  if(!guidesData[site]) guidesData[site] = [];
  const title=document.getElementById('newTitle').value.trim();
  const content=document.getElementById('newContent').value.trim().split('\n');
  const image=document.getElementById('newImage').value.trim();
  if(title && content.length>0){
    guidesData[site].push({title, content, image});
    document.getElementById('newTitle').value='';
    document.getElementById('newContent').value='';
    document.getElementById('newImage').value='';
    imagePreview.innerHTML='';
    addSection.style.display='none'; // form auto hide
    renderGuides(site);
  } else alert("Judul dan konten tidak boleh kosong!");
});

siteSelector.addEventListener('change',()=>{ renderGuides(siteSelector.value); searchInput.value=''; });
searchInput.addEventListener('input',()=>{
  const term=searchInput.value.toLowerCase();
  const site=siteSelector.value;
  const filtered=(guidesData[site]||[]).filter(g=> g.title.toLowerCase().includes(term)||g.content.join(' ').toLowerCase().includes(term));
  guidesContainer.innerHTML=filtered.map((g,idx)=>`
    <div class="guide-card" data-index="${idx}">
      <div class="guide-header" onclick="toggleContent(${idx})">
        <h3>📄 ${g.title}</h3>
      </div>
      <div class="guide-content">
        <div class="guide-flex">
          <ol>${g.content.map((step,i)=>`<li>${step}</li>`).join('')}</ol>
          ${g.image?`<img src="${g.image}" onclick="showModal(this.src)">`:''}
        </div>
        <div class="guide-actions">
          <button class="edit" onclick="startEdit(${idx})">Edit</button>
          <button class="delete" onclick="deleteGuide(${idx})">Hapus</button>
          <button class="copy" onclick="copyContent(${idx})">Copy</button>
        </div>
      </div>
    </div>
  `).join('');
});

newImageInput.addEventListener('input',()=>{ const url=newImageInput.value.trim(); imagePreview.innerHTML=url?`<img src="${url}">`:''; });
function showModal(src){ const modal=document.getElementById('imgModal'); modal.style.display='flex'; document.getElementById('modalImg').src=src; }

renderGuides(siteSelector.value);
</script>

</body>
</html>
