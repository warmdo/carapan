<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Premium Panel</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      font-size: 14px;
    }

    /* HEADER */
    header {
      padding: 20px;
      text-align: center;
    }

    h2 {
      margin: 0;
      font-weight: 600;
      font-size: 1.6rem;
    }

    /* CONTROL */
    .controls {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    input, select, button {
      padding: 8px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
    }

    input, select {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    button {
      background: linear-gradient(45deg, #3b82f6, #9333ea);
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
    }

    /* GRID */
    .grid {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 12px;
    }

    /* CARD */
    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }

    .card-header {
      padding: 12px;
      background: linear-gradient(45deg, #3b82f6, #9333ea);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
    }

    .badge {
      font-size: 0.75rem;
      background: rgba(255, 255, 255, 0.2);
      padding: 3px 6px;
      border-radius: 8px;
    }

    .card-content {
      display: none;
      padding: 12px;
    }

    .step {
      background: rgba(255, 255, 255, 0.1);
      padding: 6px;
      border-radius: 8px;
      margin-bottom: 5px;
    }

    .thumbnail {
      width: 100%;
      border-radius: 8px;
      margin-top: 8px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .thumbnail:hover {
      transform: scale(1.05);
    }

    /* ACTION */
    .actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* FORM */
    #form {
      display: none;
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #form h3 {
      margin-top: 0;
      font-size: 1.2rem;
    }

    /* FORM GROUP */
    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      font-size: 0.85rem;
      opacity: 0.7;
      display: block;
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 0.9rem;
    }

    /* TEXTAREA */
    textarea {
      min-height: 100px;
      resize: none;
    }

    /* 2 COL */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* BUTTONS */
    .btn-save,
    .btn-cancel {
      width: 48%;
      padding: 10px;
      border-radius: 12px;
      background: linear-gradient(45deg, #3b82f6, #9333ea);
      border: none;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.1);
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      padding: 8px 15px;
      border-radius: 10px;
      opacity: 0;
      transition: .3s;
    }

    #toast.show {
      opacity: 1;
    }

    /* Modal Gambar Besar */
    #largeImageModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    #largeImageModal img {
      max-width: 80%;
      max-height: 80%;
    }
  </style>
</head>

<body>

<header>
  <h2>ADMIN PANEL</h2>

  <div class="controls">
    <select id="filterSite">
      <option value="all">Semua</option>
      <option value="edan777">edan777</option>
      <option value="republik62">republik62</option>
      <option value="warga62">warga62</option>
      <option value="istana62">istana62</option>
    </select>

    <input id="search" placeholder="Cari...">
    <button onclick="openAdd()">+ Tambah</button>
  </div>
</header>

<!-- FORM -->
<div id="form">
  <h3 id="formTitle">Tambah Data</h3>

  <div class="form-group">
    <label>Judul</label>
    <input id="title">
  </div>

  <div class="form-group">
    <label>Isi</label>
    <textarea id="content"></textarea>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Site</label>
      <select id="site">
        <option value="edan777">edan777</option>
        <option value="republik62">republik62</option>
        <option value="warga62">warga62</option>
        <option value="istana62">istana62</option>
      </select>
    </div>

    <div class="form-group">
      <label>Link Gambar</label>
      <input id="image">
    </div>
  </div>

  <button class="btn-save" onclick="save()">Simpan</button>
  <button class="btn-cancel" onclick="cancel()">Batal</button>
</div>

<div id="list" class="grid"></div>
<div id="toast"></div>

<!-- Modal Gambar Besar -->
<div id="largeImageModal" onclick="closeLargeImage()">
  <img id="largeImage" src="" alt="Gambar Besar">
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyt69Xbn29z2CcDtWsqGM8vVHyqb6ZOPlO5Hxcr70hPzfK3vxQngZg8T3ezVQbooXFj/exec";
const KEY = "12345";

let data = [], filteredData = [], editId = null;

/* LOAD */
async function load() {
  const res = await fetch(API);
  data = await res.json();
  render();
}

/* RENDER */
function render() {
  const f = filterSite.value;
  const s = search.value.toLowerCase();

  filteredData = data.filter(d =>
    (f === "all" || d.site === f) &&
    (d.title.toLowerCase().includes(s) || d.content.toLowerCase().includes(s))
  );

  list.innerHTML = filteredData.map((d, i) => {
    const steps = d.content.split("\n").map(x => `<div class="step">✔ ${x}</div>`).join("");

    return `
    <div class="card">
      <div class="card-header" onclick="toggle(${i})">
        ${d.title}
        <span class="badge">${d.site}</span>
      </div>

      <div class="card-content" id="c${i}">
        ${steps}
        ${d.image ? `<img class="thumbnail" src="${d.image}" onclick="showLargeImage('${d.image}')">` : ""}

        <div class="actions">
          <button onclick="copy(${i})">Copy</button>
          <button onclick="edit(${i})">Edit</button>
          <button onclick="del('${d.uid}')">Hapus</button>
        </div>
      </div>
    </div>
    `;
  }).join("");
}

/* TOGGLE */
function toggle(i) {
  const el = document.getElementById("c" + i);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

/* COPY */
function copy(i) {
  const d = filteredData[i];
  let text = `${d.title}\n\n${d.content}`;
  if (d.image) text += `\n\n${d.image}`;
  navigator.clipboard.writeText(text);
  showToast("Copied!");
}

/* TOAST */
function showToast(msg) {
  toast.innerText = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

/* ADD */
function openAdd() {
  editId = null;
  formTitle.innerText = "Tambah Data";

  title.value = "";
  content.value = "";
  image.value = "";
  site.value = "edan777";

  form.style.display = "block";
}

/* EDIT */
function edit(i) {
  const d = filteredData[i];
  editId = d.uid;

  formTitle.innerText = "Edit Data";

  title.value = d.title;
  content.value = d.content;
  image.value = d.image;
  site.value = d.site;

  form.style.display = "block";
}

/* SAVE */
async function save() {
  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      key: KEY,
      action: editId ? "edit" : "add",
      uid: editId,
      site: site.value,
      title: title.value,
      content: content.value,
      image: image.value
    })
  });

  editId = null;
  form.style.display = "none";
  load();
}

/* DELETE */
async function del(uid) {
  await fetch(API, {
    method: "POST",
    body: JSON.stringify({ key: KEY, action: "delete", uid })
  });
  load();
}

/* CANCEL */
function cancel() {
  form.style.display = "none";
  editId = null;
}

/* Gambar Besar */
function showLargeImage(src) {
  const modal = document.getElementById("largeImageModal");
  const largeImage = document.getElementById("largeImage");
  largeImage.src = src;
  modal.style.display = "flex";
}

function closeLargeImage() {
  const modal = document.getElementById("largeImageModal");
  modal.style.display = "none";
}

filterSite.onchange = render;
search.oninput = render;

load();
</script>

</body>
</html>
