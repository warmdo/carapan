<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#d4af37;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,0.15), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,0,0,0.15), transparent 40%),
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('https://i.ibb.co/qYZSvc9N/pxfuel.jpg') center/cover no-repeat;
  color:white;
}

/* ===== BRAND COLORS ===== */
.edan777 { background: linear-gradient(45deg,#d4af37,#b8962e); }
.repulik62 { background: linear-gradient(45deg,#3b82f6,#1e40af); }
.warga62 { background: linear-gradient(45deg,#22c55e,#166534); }
.istana62 { background: linear-gradient(45deg,#ef4444,#7f1d1d); }

/* ===== LAYOUT ===== */
.container{display:flex;}
.sidebar{
  width:210px;
  height:100vh;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  padding:20px;
}

.menu div{
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}
.menu div.active,
.menu div:hover{
  background:linear-gradient(45deg,var(--gold),#8b0000);
}

.main{flex:1;padding:20px;}
.page{display:none;}
.page.active{display:block;}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}
.stat{
  background:rgba(255,255,255,0.05);
  padding:14px;
  border-radius:10px;
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:12px;
}

/* CARD */
.card{
  background:rgba(0,0,0,0.45);
  border-radius:12px;
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.05);
  transition:.3s;
}
.card:hover{
  transform:translateY(-4px);
}

/* HEADER */
.card-header{
  padding:10px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  align-items:center;
}

/* BRAND TAG */
.site-tag{
  font-size:11px;
  padding:3px 6px;
  border-radius:6px;
  background:rgba(0,0,0,0.4);
}

/* CONTENT */
.card-content{
  max-height:0;
  overflow:hidden;
  transition:.3s;
}
.card-content.active{
  max-height:260px;
  overflow:auto;
}

/* STEP */
.step{
  padding:6px;
  margin:6px;
  background:rgba(255,255,255,0.05);
  border-radius:6px;
}

/* IMAGE */
.thumbnail{
  width:90%;
  margin:10px auto;
  display:block;
  border-radius:10px;
  cursor:pointer;
}

/* ACTION */
.actions{
  display:flex;
  gap:5px;
  padding:8px;
}
button{
  flex:1;
  padding:6px;
  border:none;
  border-radius:6px;
  background:linear-gradient(45deg,var(--gold),orange);
  cursor:pointer;
}

/* FORM */
#form{
  display:none;
  margin-bottom:10px;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:10px;
}

input,select,textarea{
  width:100%;
  margin-bottom:6px;
  padding:8px;
  border:none;
  border-radius:6px;
}

/* MODAL */
#imageModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  padding:10px;
  border-radius:10px;
  opacity:0;
}
#toast.show{opacity:1;}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <h3>WEB DEPAN PANEL</h3>
  <div class="menu">
    <div id="btnDashboard" class="active" onclick="showPage('dashboard')">Dashboard</div>
    <div id="btnData" onclick="showPage('data')">Data</div>
  </div>
</div>

<div class="main">

<div id="dashboardPage" class="page active">
  <div class="stats">
    <div class="stat">Total: <span id="total">0</span></div>
    <div class="stat">edan777: <span id="s1">0</span></div>
    <div class="stat">republik62: <span id="s2">0</span></div>
    <div class="stat">warga62: <span id="s3">0</span></div>
    <div class="stat">istana62: <span id="s4">0</span></div>
  </div>
</div>

<div id="dataPage" class="page">

  <div class="topbar">
    <select id="filterSite">
      <option value="all">Semua</option>
      <option value="edan777">edan777</option>
      <option value="republik62">republik62</option>
      <option value="warga62">warga62</option>
      <option value="istana62">istana62</option>
    </select>

    <input id="search" placeholder="Cari...">
    <button onclick="openAdd()">+ Tambah</button>
  </div>

  <div id="form">
    <input id="title" placeholder="Judul">
    <textarea id="content" placeholder="Isi"></textarea>

    <select id="site">
      <option value="edan777">edan777</option>
      <option value="republik62">republik62</option>
      <option value="warga62">warga62</option>
      <option value="istana62">istana62</option>
    </select>

    <input id="image" placeholder="Link Gambar">

    <button onclick="save()">Simpan</button>
    <button onclick="cancel()">Batal</button>
  </div>

  <div id="list" class="grid"></div>

</div>

</div>
</div>

<div id="imageModal" onclick="closeImage()">
  <img id="modalImg" style="max-width:80%; max-height:80%;">
</div>

<div id="toast"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbyt69Xbn29z2CcDtWsqGM8vVHyqb6ZOPlO5Hxcr70hPzfK3vxQngZg8T3ezVQbooXFj/exec";
const KEY="12345";

let data=[],filteredData=[],editId=null;

function showPage(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".menu div").forEach(x=>x.classList.remove("active"));

  if(p==="dashboard"){
    dashboardPage.classList.add("active");
    btnDashboard.classList.add("active");
  }else{
    dataPage.classList.add("active");
    btnData.classList.add("active");
  }
}

async function load(){
  const res=await fetch(API);
  data=await res.json();
  render();
}

function render(){
  total.innerText=data.length;
  s1.innerText=data.filter(x=>x.site==="edan777").length;
  s2.innerText=data.filter(x=>x.site==="republik62").length;
  s3.innerText=data.filter(x=>x.site==="warga62").length;
  s4.innerText=data.filter(x=>x.site==="istana62").length;

  const f=filterSite.value;
  const s=search.value.toLowerCase();

  filteredData=data.filter(d=>
    (f==="all"||d.site===f)&&
    d.title.toLowerCase().includes(s)
  );

  list.innerHTML=filteredData.map((d,i)=>`
  <div class="card">
    <div class="card-header ${d.site}" onclick="toggle(${i})">
      <div>${d.title}</div>
      <div class="site-tag">${d.site}</div>
    </div>

    <div class="card-content" id="c${i}">
      ${d.content.split("\n").map(x=>`<div class="step">✔ ${x}</div>`).join("")}

      ${d.image?`<img src="${d.image}" class="thumbnail" onclick="showImage('${d.image}')">`:''}

      <div class="actions">
        <button onclick="copy(${i})">Copy</button>
        <button onclick="edit(${i})">Edit</button>
        <button onclick="del('${d.uid}')">Hapus</button>
      </div>
    </div>
  </div>
  `).join("");
}

function toggle(i){
  document.getElementById("c"+i).classList.toggle("active");
}

function openAdd(){ editId=null; form.style.display="block"; }

function edit(i){
  const d=filteredData[i];
  editId=d.uid;
  title.value=d.title;
  content.value=d.content;
  image.value=d.image;
  site.value=d.site;
  form.style.display="block";
}

async function save(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      key:KEY,
      action:editId?"edit":"add",
      uid:editId,
      site:site.value,
      title:title.value,
      content:content.value,
      image:image.value
    })
  });
  form.style.display="none";
  load();
}

async function del(uid){
  if(!confirm("Hapus data?"))return;
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({key:KEY,action:"delete",uid})
  });
  load();
}

function cancel(){ form.style.display="none"; }

function copy(i){
  const d=filteredData[i];
  let text=`${d.title}\n\n${d.content}`;
  if(d.image) text+=`\n\n${d.image}`;
  navigator.clipboard.writeText(text);
  toast.innerText="Copied!";
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),2000);
}

function showImage(src){
  modalImg.src=src;
  imageModal.style.display="flex";
}
function closeImage(){ imageModal.style.display="none"; }

filterSite.onchange=render;
search.oninput=render;

load();
</script>

</body>
</html>
